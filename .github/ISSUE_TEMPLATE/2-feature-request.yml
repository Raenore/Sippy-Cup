name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE]: "
labels: ["enhancement", "needs triage"]
assignees:
  - Raenore
body:
- type: checkboxes
  attributes:
    label: Is there an existing feature request for this?
    description: Please search to see if a similar request already exists.
    options:
      - label: I have searched the existing feature requests
        required: true
- type: textarea
  attributes:
    label: Problem
    description: A clear and concise description of what the problem is.
    placeholder: Ex. I'm always frustrated when [...]
  validations:
    required: true
- type: textarea
  attributes:
    label: Proposed solution
    description: A clear and concise description of what you want to happen.
  validations:
    required: true
- type: textarea
  attributes:
    label: Alternatives considered
    description: A clear and concise description of any alternative solutions or features considered.
  validations:
    required: false
- type: upload
  id: screenshots
  attributes:
    label: Upload screenshots
    description: Add screenshots if applicable to support your feature request.
  validations:
    required: false
- type: textarea
  attributes:
    label: Additional context
    description: Add any other context related to the feature request.
  validations:
    required: false
